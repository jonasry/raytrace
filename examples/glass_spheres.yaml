globals:
  recursion_depth: 6
  oversampling: 1
  background_color: [0.70,0.82,0.96]

output:
  filename: "glass_spheres.png"
  format: PNG
  resolution: [900,600]

camera:
  type: perspective
  position: [0,-10,3]
  look_at: [0,0,2]
  up: [0,0,1]
  focal_length: 2.6

textures:
  - name: floor_checker
    type: checker
    base_textures: [floor_light, floor_dark]
    cells: [4,4,1]

  - name: floor_light
    type: solid
    color: [1.8,1.8,1.8]

  - name: floor_dark
    type: solid
    color: [0.15,0.18,0.20]

  - name: matte_red
    type: material
    diffuse: [1.4,0.15,0.15]
    specular: [0.0,0.0,0.0]
    shine_pow: 0.2
    ks: 0.0

  - name: matte_blue
    type: material
    diffuse: [0.2,0.35,1.3]
    specular: [0.0,0.0,0.0]
    shine_pow: 0.2
    ks: 0.0

  - name: glass
    type: material
    diffuse: [0.0,0.0,0.0]
    specular: [0.0,0.0,0.0]
    shine_pow: 0.05
    ks: 0.0
    ior: 1.5
    transparency: 1.0

lights:
  - id: sun
    type: point
    position: [8,-6,12]
    intensity: [0.8,0.8,0.8]

  - id: fill
    type: point
    position: [-8,-3,10]
    intensity: [0.25,0.25,0.30]

  - id: ambient
    type: ambient
    intensity: [0.20,0.20,0.22]

objects:
  - id: floor
    type: plane
    point: [0,0,0.1]
    normal: [0,0,1]
    texture: floor_checker

  - id: rear_red
    type: sphere
    center: [-1.7,2.5,1.3]
    radius: 1.3
    texture: matte_red

  - id: rear_blue
    type: sphere
    center: [2.4,3.8,1.0]
    radius: 1.0
    texture: matte_blue

  - id: glass_front
    type: sphere
    center: [0,0.5,1.8]
    radius: 1.8
    texture: glass
