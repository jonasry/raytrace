globals:
  recursion_depth: 5
  oversampling: 4
  background_color: [0.2,0.55,0.85]

output:
  filename: "example.png"
  format: PNG
  resolution: [400,300]

camera:
  type: perspective
  position: [3,-10,6]
  look_at: [1,1,1]
  up: [0,0,1]
  focal_length: 4

textures:
  - name: white
    type: solid
    color: [1,1,1]
  - name: green
    type: solid
    color: [0,2,0]

lights:
  - id: key
    type: point
    position: [5,10,20]
    intensity: [0.3,0.3,0.3]
  - id: fill
    type: point
    position: [-10,-5,20]
    intensity: [0.24,0.24,0.24]
  - id: rim
    type: point
    position: [7,-5,20]
    intensity: [0.3,0.3,0.3]
  - id: ambient
    type: ambient
    intensity: [0.3,0.288,0.261]

objects:
  - id: floor
    type: plane
    point: [0,0,0.01]
    normal: [0,0,1]
    texture: green
  - id: ball
    type: sphere
    center: [1,1,1]
    radius: 1
    texture: white
    transforms:
      - translate: [0,0,0]
      - scale: [1,1,1]
