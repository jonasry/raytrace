globals:
  recursion_depth: 5
  oversampling: 1
  background_color: [0.20,0.25,0.35]

output:
  filename: "render.png"
  format: PNG
  resolution: [400,300]

camera:
  type: perspective
  position: [3,-10,6]
  look_at: [0,-2,4]
  up: [0,0,1]
  focal_length: 2.75

# Historical note:
# The original setup also built a right-eye camera and wrote "right.img".
# The YAML loader still renders a single camera per file, so that path is
# intentionally preserved here as documentation rather than active config.

textures:
  - name: white
    type: solid
    color: [2,2,2]

  - name: blue
    type: solid
    color: [0,0,2]

  - name: green
    type: solid
    color: [0,2,0]

  - name: red
    type: solid
    color: [2,0,0]

  - name: black
    type: solid
    color: [0,0,0]

  - name: tex5
    type: material
    diffuse: [0,0,0]
    specular: to_spec(0.80, 0.40, 0.20)
    shine_pow: 0.1
    ks: 0.6
    ior: 1.0

  - name: tex6
    type: material
    diffuse: [0,0,0]
    specular: to_spec(0.55, 0.75, 0.70)
    shine_pow: 0.1
    ks: 0.6
    ior: 1.0

  - name: tex7
    type: material
    diffuse: [0,0,0]
    specular: to_spec(0.55, 0.75, 0.70)
    shine_pow: 0.05
    ks: 0.6
    ior: 1.0

  - name: tex8
    type: checker
    base_textures: [white,blue]
    cells: [2,2,2]

  - name: tex9
    type: noise
    base_textures: [white,black]
    scale: 0.3

  - name: tex10
    type: turbulence
    base_textures: [white,red]
    scale: 0.2

  - name: tex11
    type: marble
    base_textures: [tex10,tex7]
    scale: 0.25

  - name: tex12
    type: turbulence
    base_textures: [blue,black]
    scale: 0.5

  - name: tex13
    type: turbulence
    base_textures: [white,black]
    scale: 0.5

  - name: tex14
    type: turbulence
    base_textures: [white,tex5]
    scale: 0.5

lights:
  - id: key
    type: point
    position: [5,10,20]
    intensity: [0.3,0.3,0.3]

  - id: fill
    type: point
    position: [-10,-5,20]
    intensity: [0.24,0.24,0.24]

  - id: rim
    type: point
    position: [7,-5,20]
    intensity: [0.3,0.3,0.3]

  - id: ambient
    type: ambient
    intensity: [0.3,0.288,0.261]

objects:
  - id: red_box
    type: box
    min: [0,0,0]
    max: [1,1,1]
    texture: red
    transforms:
      - translate: [-0.5,-0.5,0]
      - rotate: [0,0,0.1745]
      - scale: [1,1,2]
      - translate: [0,5,0]

  - id: textured_box_1
    type: box
    min: [0,0,0]
    max: [1,1,1]
    texture: tex14
    transforms:
      - translate: [-0.5,-0.5,0]
      - rotate: [0,0,0.22]
      - scale: [1,1,2]
      - translate: [-3,5,0]

  - id: textured_box_2
    type: box
    min: [0,0,0]
    max: [1,1,1]
    texture: tex13
    transforms:
      - translate: [-0.5,-0.5,0]
      - rotate: [0,0.15,0.10]
      - scale: [1,1,2]
      - translate: [-3,7,1]

  - id: textured_box_3
    type: box
    min: [0,0,0]
    max: [1,1,1]
    texture: tex10
    transforms:
      - translate: [-0.5,-0.5,0]
      - rotate: [0.20,0,0.33]
      - scale: [1,1,2]
      - translate: [-3,3,2]

  - id: floor
    type: plane
    point: [0,0,0.01]
    normal: [0,0,1]
    texture: tex8
    transforms:
      - translate: [0,0,0]
      - rotate: [0,0,0.3491]

  - id: far_sphere
    type: sphere
    center: [-5,4,3]
    radius: 2.0
    texture: tex5

  - id: sphere_top
    type: sphere
    center: [0,0,0]
    radius: 1.0
    texture: tex5
    transforms:
