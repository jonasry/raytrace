# Historical scratchpad, carried over from the old setup.cpp:
#
# - Alternate early layout:
#   - checker plane at [0,0,0.01]
#   - spheres at [1,-3,2], [1,2.5,3], [-2,-2.5,2], [0,4,3]
#   - thin box from [-5,0,0] to [-4,20,5]
#   - cone from base [1,3,2] to apex [0,4,3], radius 0.5, then translated by [1,1,1]
#
# - CSG experiment:
#   - sphere(red): radius 1 at [0,0,0]
#   - sphere(blue): radius 1 at [0,0,0], translated by [0,0,0.5], flip_inside: true
#   - intersect of those two children, then rotate [0.2,0.1,0.3] and translate [0,0,3]
#
# - Cone/intersection experiment that was built but never added:
#   - cone axis object based on base [0,0,0], apex [0,1,0], radius 1.0, texture tex11
#   - optional transforms: rotate [0,0,0.20], translate [-3,3,1.2]
#   - intersect with sphere radius 2 at [0,1,0], texture tex6
#
# - Extra orbit single:
#   - sphere radius 0.5 at origin, texture tex6
#   - translate [0,4,2]
#   - rotate [0.2,0.3,0]
#
# - Symmetric sphere cluster:
#   - large sphere radius 2 at [0,0,2], texture tex6
#   - medium spheres radius 1 at [-3,0,2], [3,0,2], [0,-3,2], [0,3,2]
#   - small spheres radius 0.6 at [-3,3,2], [3,3,2], [3,-3,2], [-3,-3,2]
